<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>*{box-sizing:border-box}body{margin:0;background:#001b2d;color:#dceaf4;font-family:Barlow,Arial,sans-serif}.wrap{max-width:1220px;margin:auto;padding:40px 28px}.top{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:30px}.back{background:#ff7900;color:#001b2d;padding:12px 20px;font:800 15px 'Barlow Condensed';text-decoration:none;border-radius:3px}.eyebrow{color:#f7c52b;font:800 14px 'Barlow Condensed';letter-spacing:.16em;text-transform:uppercase}h1{font:400 clamp(48px,7vw,82px)/1 'Bebas Neue';color:#fff;margin:8px 0}.note{color:#8eafc5;font-size:18px;line-height:1.6;margin:0 0 28px}.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.photo{aspect-ratio:4/3;overflow:hidden;background:#002b49;border-radius:5px}.photo img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer}@media(max-width:850px){.photos{grid-template-columns:repeat(2,1fr)}}@media(max-width:520px){.wrap{padding:25px 15px}.photos{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><main class="wrap"><div class="top"><div><div class="eyebrow" id="eyebrow">GALERÍA</div><h1 id="title">Galería</h1></div><a class="back" id="back" href="index.html#gallery">VOLVER</a></div><p class="note" id="note"></p><div class="photos" id="photos"><p>Cargando...</p></div></main>
