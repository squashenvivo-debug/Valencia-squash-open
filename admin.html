<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Publicador de noticias · PSA Valencia 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#001b2d;color:#fff;font-family:Arial,sans-serif}
main{max-width:800px;margin:40px auto;padding:20px}.box{background:#002b49;padding:25px;border-radius:8px;margin-bottom:22px}
h1,h2{margin-top:0}label{display:block;margin:14px 0 6px;color:#c1d0d9}
input,textarea{width:100%;padding:13px;border:1px solid #527287;border-radius:4px;font-size:16px}
textarea{min-height:180px}button{border:0;background:#ff7900;color:#001b2d;padding:13px 22px;font-weight:700;border-radius:4px;cursor:pointer;margin-top:16px}
button:disabled{opacity:.5}.hidden{display:none!important}.msg{margin-top:15px;padding:12px;background:#001b2d;border-left:3px solid #f7c52b;white-space:pre-wrap}
.error{border-left-color:#ff5252}.ok{border-left-color:#4caf50}small{color:#9fb2bd}
</style>
</head>
<body><main>
<h1>PSA Valencia 2026</h1>
<div id="loginBox" class="box">
<h2>Acceso al publicador</h2>
<p><small>Introduce exactamente el email con el que creaste el usuario en Supabase.</small></p>
<label>Email</label><input id="email" type="email" autocomplete="username">
<label>Contraseña</label><input id="password" type="password" autocomplete="current-password">
<button id="login" type="button">ENTRAR</button>
<div id="loginMsg" class="msg hidden"></div>
</div>

<div id="publisher" class="box hidden">
<h2>Publicar noticia</h2>
<div id="who"></div>
<label>Título</label><input id="title">
<label>Fecha</label><input id="newsDate" type="date">
<label>Imagen</label><input id="image" type="file" accept="image/*">
<label>Descripción / noticia</label><textarea id="description"></textarea>
<button id="publish" type="button">PUBLICAR NOTICIA</button>
<button id="logout" type="button">CERRAR SESIÓN</button>
<div id="pubMsg" class="msg hidden"></div>
</div>
</main>
<script>
(function(){
  const URL="https://texjzaanugmssmolzwgb.supabase.co";
  const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRleGp6YWFudWdtc3Ntb2x6d2diIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NzU5MDYsImV4cCI6MjEwMDA1MTkwNn0.L36iUvzMeZnLfT-3sqXzjPFJ_S_of20ATi1_QKKxWGo";
  const el=id=>document.getElementById(id);
  function msg(id,text,type){const x=el(id);x.textContent=text;x.className='msg '+(type||'');}
  function hideMsg(id){el(id).className='msg hidden';}
  if(!window.supabase){msg('loginMsg','ERROR: No se ha podido cargar la librería de Supabase. Comprueba la conexión a Internet.','error');return;}
  const client=window.supabase.createClient(URL,KEY);
  el('newsDate').value=new Date().toISOString().slice(0,10);

  async function showSession(){
    const res=await client.auth.getSession();
    const session=res.data.session;
    el('loginBox').classList.toggle('hidden',!!session);
    el('publisher').classList.toggle('hidden',!session);
    if(session)el('who').textContent='Sesión iniciada: '+session.user.email;
  }

  el('login').addEventListener('click',async function(){
    hideMsg('loginMsg');
    const email=el('email').value.trim();
    const password=el('password').value;
    if(!email||!password){msg('loginMsg','Escribe email y contraseña.','error');return;}
    this.disabled=true;msg('loginMsg','Conectando con Supabase...');
    try{
      const res=await client.auth.signInWithPassword({email:email,password:password});
      if(res.error)throw res.error;
      msg('loginMsg','Acceso correcto.','ok');
      await showSession();
    }catch(err){
      msg('loginMsg','ERROR DE SUPABASE: '+(err.message||String(err)),'error');
    }finally{this.disabled=false;}
  });

  el('logout').addEventListener('click',async()=>{await client.auth.signOut();await showSession();});

  el('publish').addEventListener('click',async function(){
    const title=el('title').value.trim(), description=el('description').value.trim(), news_date=el('newsDate').value, file=el('image').files[0];
    if(!title||!description||!news_date){msg('pubMsg','Completa título, fecha y descripción.','error');return;}
    this.disabled=true;msg('pubMsg','Publicando...');
    try{
      let image_url=null;
      if(file){
        const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
        const path=Date.now()+'-'+Math.random().toString(36).slice(2)+'.'+ext;
        const up=await client.storage.from('news-images').upload(path,file,{upsert:false});
        if(up.error)throw up.error;
        image_url=client.storage.from('news-images').getPublicUrl(path).data.publicUrl;
      }
      const ins=await client.from('news').insert({title,description,news_date,image_url});
      if(ins.error)throw ins.error;
      msg('pubMsg','Noticia publicada correctamente. Ya debe aparecer en la web.','ok');
      el('title').value='';el('description').value='';el('image').value='';
    }catch(err){msg('pubMsg','ERROR: '+(err.message||String(err)),'error');}
    finally{this.disabled=false;}
  });
  showSession().catch(e=>msg('loginMsg','ERROR INICIAL: '+e.message,'error'));
})();
</script>
</body></html>
